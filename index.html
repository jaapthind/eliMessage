<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JMessage</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='15%25' fill='%2334C759'/%3E%3Cpath d='M256 100c-102.5 0-185.6 70.3-185.6 157 0 49.3 26.6 93.3 68.6 123.1-6.1 23.3-22 62.4-22.7 64-.5 1.2-.1 2.6 1 3.4.5.3 1 .5 1.5.5.9 0 1.8-.4 2.4-1.1 1.1-1.3 43-51.5 61.1-68.8 23.2 10.3 49 16.3 73.7 16.3 102.5 0 185.6-70.3 185.6-157S358.5 100 256 100z' fill='white'/%3E%3C/svg%3E">
    <script src="[https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js](https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js)"></script>
    <style>
        /* ==========================================================================
           IOS JMESSAGE CSS RESET & VARIABLES
           ========================================================================== */
        :root {
            /* iOS Dark Mode Colors */
            --bg-base: #000000;
            --bg-elevated: #1c1c1e;
            --bg-elevated-hover: #2c2c2e;
            --bg-blur: rgba(28, 28, 30, 0.75);
            --bg-blur-light: rgba(44, 44, 46, 0.75);
           
            --tint-blue: #0a84ff;
            --tint-blue-active: #0060cb;
            --tint-green: #30d158;
            --tint-red: #ff453a;
            --tint-gray: #8e8e93;
           
            --text-primary: #ffffff;
            --text-secondary: #ebebf599; /* 60% opacity */
            --text-tertiary: #ebebf54d;  /* 30% opacity */
            --text-placeholder: #ebebf54d;
           
            --separator: #38383a;
            --separator-opaque: #38383a;
           
            --bubble-me: #0a84ff;
            --bubble-them: #26252a;
            --bubble-them-text: #ffffff;
           
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            --font-family-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
           
            --easing: cubic-bezier(0.25, 1, 0.5, 1);
            --transition-fast: 0.15s var(--easing);
            --transition-med: 0.3s var(--easing);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-family);
            background-color: #121212; /* Outer page background */
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #2a2a35 0%, #121212 60%);
        }

        /* ==========================================================================
           DEVICE WRAPPER & RESPONSIVE LAYOUT
           ========================================================================== */
        .device-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .jmessage-app {
            background-color: var(--bg-base);
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1), 0 20px 40px rgba(0,0,0,0.5);
        }

        @media (min-width: 850px) {
            .jmessage-app {
                width: 1200px;
                height: 90vh;
                border-radius: 12px;
                max-height: 900px;
            }
        }

        /* ==========================================================================
           SIDEBAR (CONVERSATION LIST)
           ========================================================================== */
        .sidebar {
            width: 350px;
            height: 100%;
            background-color: var(--bg-base);
            border-right: 1px solid var(--separator);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 20;
            transition: transform 0.3s var(--easing);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                width: 100%;
                transform: translateX(0);
            }
            .sidebar.hidden-mobile {
                transform: translateX(-100%);
            }
        }

        .sidebar-header {
            padding: 16px 20px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-blur);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .sidebar-header h1 {
            font-family: var(--font-family-display);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .sidebar-actions {
            display: flex;
            gap: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--tint-blue);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity var(--transition-fast);
        }
        .icon-btn:active {
            opacity: 0.5;
        }
        .icon-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .search-container {
            padding: 8px 16px 12px;
            background-color: var(--bg-base);
        }

        .search-bar {
            background-color: var(--bg-elevated);
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding: 6px 8px;
        }

        .search-bar svg {
            width: 16px;
            height: 16px;
            fill: var(--text-secondary);
            margin: 0 6px;
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            width: 100%;
            outline: none;
            font-family: var(--font-family);
        }
        .search-bar input::placeholder {
            color: var(--text-placeholder);
        }

        .conversation-list {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        .conversation-list::-webkit-scrollbar {
            display: none; /* Hide scrollbar for iOS feel */
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            cursor: pointer;
            transition: background-color var(--transition-fast);
            position: relative;
        }
        .chat-item:active {
            background-color: var(--bg-elevated);
        }
        .chat-item.active {
            background-color: var(--tint-blue);
        }
        .chat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 76px; /* Align with text */
            right: 0;
            height: 1px;
            background-color: var(--separator);
        }
        .chat-item.active::after {
            display: none;
        }

        .avatar-lrg {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(180deg, #999, #666);
            margin-right: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 500;
            flex-shrink: 0;
        }

        .chat-item.active .avatar-lrg {
            border: 2px solid white;
        }

        .chat-preview {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .chat-preview-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2px;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-item.active .chat-name {
            color: white;
        }

        .chat-time {
            font-size: 14px;
            color: var(--text-secondary);
            flex-shrink: 0;
            margin-left: 10px;
        }
        .chat-item.active .chat-time {
            color: rgba(255,255,255,0.8);
        }

        .chat-msg-preview {
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }
        .chat-item.active .chat-msg-preview {
            color: rgba(255,255,255,0.8);
        }

        /* ==========================================================================
           MAIN CHAT VIEW
           ========================================================================== */
        .main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-base);
            position: relative;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .main-view {
                position: absolute;
                width: 100%;
                height: 100%;
                transform: translateX(100%);
                transition: transform 0.3s var(--easing);
            }
            .main-view.active-mobile {
                transform: translateX(0);
            }
        }

        /* --- Chat Header --- */
        .chat-header {
            height: 60px;
            background-color: var(--bg-blur);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--separator);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .header-left {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .back-btn {
            display: none;
            align-items: center;
            color: var(--tint-blue);
            font-size: 17px;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
        }
        .back-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            margin-right: -4px;
        }

        @media (max-width: 768px) {
            .back-btn {
                display: flex;
            }
        }

        .header-center {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .header-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(180deg, #999, #666);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            margin-bottom: 2px;
        }

        .header-name-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-name {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .header-name-wrap svg {
            width: 8px;
            height: 8px;
            fill: var(--text-secondary);
        }

        .header-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
        }

        /* --- Chat History --- */
        .chat-history {
            flex: 1;
            padding: 80px 16px 20px; /* Top padding clears header */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .chat-history::-webkit-scrollbar {
            display: none;
        }

        .timestamp {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin: 24px 0 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .msg-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 2px; /* Tight gap between messages of same sender */
            width: 100%;
        }

        .msg-group.spacer {
            margin-bottom: 12px; /* Space between different senders */
        }

        .bubble-wrapper {
            display: flex;
            width: 100%;
            margin-bottom: 2px;
        }

        .bubble-wrapper.me {
            justify-content: flex-end;
        }

        .bubble-wrapper.them {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 75%;
            padding: 8px 14px;
            font-size: 16px;
            line-height: 1.35;
            word-wrap: break-word;
            white-space: pre-wrap;
            position: relative;
            z-index: 1;
        }

        /* EXACT IOS TAILS AND RADII */
        .me .bubble {
            background-color: var(--bubble-me);
            color: white;
            border-radius: 18px 18px 4px 18px;
        }
       
        /* If it's the top message in a group */
        .me .bubble.top {
            border-radius: 18px 18px 4px 18px;
        }
        /* Middle message */
        .me .bubble.middle {
            border-radius: 18px 4px 4px 18px;
        }
        /* Bottom message (has tail) */
        .me .bubble.bottom {
            border-radius: 18px 4px 18px 18px;
        }
        /* Single message (has tail) */
        .me .bubble.single {
            border-radius: 18px;
        }

        /* The Tail for 'me' */
        .me .bubble.bottom::before, .me .bubble.single::before {
            content: "";
            position: absolute;
            bottom: 0;
            right: -8px;
            height: 20px;
            width: 20px;
            background-color: var(--bubble-me);
            border-bottom-left-radius: 16px;
            z-index: -1;
        }
        .me .bubble.bottom::after, .me .bubble.single::after {
            content: "";
            position: absolute;
            bottom: 0;
            right: -10px;
            height: 20px;
            width: 20px;
            background-color: var(--bg-base); /* match background to cut out shape */
            border-bottom-left-radius: 10px;
            z-index: -1;
        }

        .them .bubble {
            background-color: var(--bubble-them);
            color: var(--bubble-them-text);
            border-radius: 18px 18px 18px 4px;
        }

        .them .bubble.top {
            border-radius: 18px 18px 18px 4px;
        }
        .them .bubble.middle {
            border-radius: 4px 18px 18px 4px;
        }
        .them .bubble.bottom {
            border-radius: 4px 18px 18px 18px;
        }
        .them .bubble.single {
            border-radius: 18px;
        }

        /* The Tail for 'them' */
        .them .bubble.bottom::before, .them .bubble.single::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: -8px;
            height: 20px;
            width: 20px;
            background-color: var(--bubble-them);
            border-bottom-right-radius: 16px;
            z-index: -1;
        }
        .them .bubble.bottom::after, .them .bubble.single::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: -10px;
            height: 20px;
            width: 20px;
            background-color: var(--bg-base);
            border-bottom-right-radius: 10px;
            z-index: -1;
        }

        .status-text {
            font-size: 11px;
            color: var(--text-secondary);
            text-align: right;
            margin-top: 2px;
            margin-right: 8px;
            opacity: 0;
            transition: opacity 0.3s;
            height: 0;
            overflow: hidden;
        }
        .status-text.show {
            opacity: 1;
            height: auto;
            margin-bottom: 8px;
        }

        /* --- Media Attachments within Bubbles --- */
        .media-preview {
            max-width: 250px;
            border-radius: 14px;
            overflow: hidden;
            margin: 2px;
        }
        .media-preview img, .media-preview video {
            width: 100%;
            display: block;
            object-fit: cover;
        }
        /* Remove padding for media bubbles */
        .bubble.media-bubble {
            padding: 0;
            background: transparent !important;
        }
        .bubble.media-bubble::before, .bubble.media-bubble::after {
            display: none;
        }
        .audio-bubble audio {
            height: 36px;
            max-width: 200px;
            border-radius: 18px;
            outline: none;
            background-color: transparent;
        }

        /* ==========================================================================
           INPUT AREA (IOS STYLE)
           ========================================================================== */
        .input-area-container {
            padding: 8px 16px 24px;
            background-color: var(--bg-blur);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--separator);
            position: relative;
            z-index: 100;
        }

        .input-row {
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        .btn-plus {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: none;
            cursor: pointer;
            margin-bottom: 2px;
        }
        .btn-plus svg {
            width: 16px;
            height: 16px;
            fill: var(--tint-gray);
        }

        .input-field-wrapper {
            flex: 1;
            background-color: var(--bg-base);
            border: 1px solid var(--separator);
            border-radius: 20px;
            display: flex;
            align-items: flex-end;
            min-height: 36px;
            position: relative;
            padding-right: 36px; /* space for absolute button */
        }

        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.3;
            padding: 8px 12px;
            max-height: 120px;
            resize: none;
            outline: none;
            font-family: var(--font-family);
        }
        #messageInput::placeholder {
            color: var(--text-placeholder);
        }

        .btn-action-right {
            position: absolute;
            right: 4px;
            bottom: 4px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        /* Mic state */
        .btn-action-right.state-mic {
            background-color: transparent;
        }
        .btn-action-right.state-mic svg {
            width: 16px;
            height: 16px;
            fill: var(--tint-gray);
        }

        /* Send state */
        .btn-action-right.state-send {
            background-color: var(--tint-blue);
        }
        .btn-action-right.state-send:active {
            background-color: var(--tint-blue-active);
        }
        .btn-action-right.state-send svg {
            width: 14px;
            height: 14px;
            fill: white;
            margin-top: -1px; /* Optical adjustment */
        }
       
        /* Recording state */
        .btn-action-right.state-recording {
            background-color: var(--tint-red);
            animation: pulse-recording 1.5s infinite;
        }
        .btn-action-right.state-recording svg {
            width: 12px;
            height: 12px;
            fill: white;
        }

        @keyframes pulse-recording {
            0% { box-shadow: 0 0 0 0 rgba(255, 69, 58, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 69, 58, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 69, 58, 0); }
        }

        /* App Drawer (Bar above keyboard) */
        .app-drawer {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            padding: 0 4px;
            overflow-x: auto;
        }
        .app-drawer::-webkit-scrollbar { display: none; }
       
        .app-icon {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
        }
        .app-icon svg { width: 18px; height: 18px; fill: white; }
       
        .app-photos { background: linear-gradient(135deg, #FF2D55, #FF375F); }
        .app-store { background: linear-gradient(135deg, #0A84FF, #007AFF); }
        .app-camera { background: linear-gradient(135deg, #8E8E93, #C7C7CC); }
        .app-music { background: linear-gradient(135deg, #FF2D55, #FF375F); }
        .app-digital { background: black; border: 1px solid #333; }
        .app-digital svg { fill: #00FF00; }

        /* ==========================================================================
           MODALS & OVERLAYS (CONNECTION / NEW MESSAGE)
           ========================================================================== */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-base);
            z-index: 500;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.4s var(--easing);
        }
        .modal-overlay.active {
            transform: translateY(0);
        }

        .modal-header {
            height: 60px;
            background-color: var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid var(--separator);
        }
        .modal-header button {
            background: none; border: none; font-size: 17px; color: var(--tint-blue); cursor: pointer;
        }
        .modal-header h2 {
            font-size: 17px; font-weight: 600;
        }

        .modal-content {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .form-group {
            background-color: var(--bg-elevated);
            border-radius: 10px;
            padding: 0 16px;
            margin-bottom: 20px;
        }
        .form-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--separator);
        }
        .form-row:last-child { border-bottom: none; }
        .form-label {
            color: var(--text-secondary);
            width: 80px;
            font-size: 16px;
        }
        .form-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
        }
        .form-text-large {
            font-family: monospace;
            font-size: 18px;
            color: var(--tint-blue);
            letter-spacing: 2px;
        }

        .blocker-overlay {
            position: absolute;
            top: 60px; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-base);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .blocker-overlay p {
            color: var(--text-secondary);
            font-size: 16px;
            margin-top: 10px;
        }

        /* File Input Hidden */
        input[type="file"] { display: none; }
       
        .hidden { display: none !important; }

        /* Animation for typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background-color: var(--bubble-them);
            border-radius: 18px;
            width: fit-content;
            margin-bottom: 12px;
        }
        .typing-dot {
            width: 6px; height: 6px; border-radius: 50%; background-color: var(--text-secondary);
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

    </style>
</head>
<body>

    <div class="device-wrapper">
        <div class="jmessage-app">
           
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <button class="icon-btn" style="visibility: hidden;"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2"/></svg></button>
                    <h1>JMessages</h1>
                    <div class="sidebar-actions">
                        <button class="icon-btn" id="btnMyProfile" title="My ID">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                        </button>
                       
                        <button class="icon-btn" onclick="cycleTheme()" title="Change Theme">
                            <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 000 18 9 9 0 000-18zm0 16.2a7.2 7.2 0 110-14.4 7.2 7.2 0 010 14.4zM7.8 12a4.2 4.2 0 108.4 0 4.2 4.2 0 00-8.4 0z"/></svg>
                        </button>
                       
                        <button class="icon-btn" id="btnNewMessage" title="New Message">
                            <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        </button>
                    </div>
                </div>

                <div class="search-container">
                    <div class="search-bar">
                        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        <input type="text" placeholder="Search">
                    </div>
                </div>

                <div class="conversation-list" id="conversationList">
                    </div>
            </div>

            <div class="main-view" id="mainView">
               
                <div class="chat-header">
                    <div class="header-left">
                        <button class="back-btn" id="btnBackToSidebar">
                            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                            <span id="unreadCount" style="margin-left:2px;"></span>
                        </button>
                    </div>
                   
                    <div class="header-center">
                        <div class="header-avatar" id="activeAvatar">?</div>
                        <div class="header-name-wrap">
                            <span class="header-name" id="activeName">New Message</span>
                            <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
                        </div>
                    </div>
                   
                    <div class="header-right">
                        <button class="icon-btn"><svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg></button>
                        <button class="icon-btn" style="margin-right:-8px;"><svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></button>
                    </div>
                </div>

                <div class="blocker-overlay" id="chatBlocker">
                    <p>No conversation selected</p>
                </div>

                <div class="chat-history" id="chatHistory">
                    </div>

                <div class="input-area-container">
                    <div class="input-row">
                        <button class="btn-plus" id="btnAttachMenu">
                            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        </button>
                       
                        <div class="input-field-wrapper">
                            <textarea id="messageInput" placeholder="JMessage" rows="1"></textarea>
                           
                            <button class="btn-action-right state-mic" id="btnInputRight">
                                <svg class="icon-mic" viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
                            </button>
                        </div>
                    </div>
                   
                    <div class="app-drawer">
                        <div class="app-icon app-photos" id="btnAppPhotos" onclick="document.getElementById('fileInput').click()">
                            <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                        </div>
                        <div class="app-icon app-store">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                        </div>
                        <div class="app-icon app-camera">
                            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
   
    <input type="file" id="fileInput" accept="image/*,video/*" class="hidden">

    <div class="modal-overlay" id="modalProfile">
        <div class="modal-header">
            <button onclick="document.getElementById('modalProfile').classList.remove('active')">Cancel</button>
            <h2>My Profile</h2>
            <button style="visibility:hidden">Done</button>
        </div>
        <div class="modal-content">
            <div class="form-group">
                <div class="form-row" style="flex-direction: column; align-items: flex-start; gap: 8px;">
                    <span class="form-label" style="width: auto;">Your JMessage ID:</span>
                    <span class="form-text-large" id="myPeerIdDisplay">Generating...</span>
                </div>
            </div>
            <p style="color: var(--text-secondary); font-size: 14px; padding: 0 16px;">Share this ID with a friend so they can message you.</p>
        </div>
    </div>

    <div class="modal-overlay" id="modalNewChat">
        <div class="modal-header">
            <button onclick="document.getElementById('modalNewChat').classList.remove('active')">Cancel</button>
            <h2>New Message</h2>
            <button onclick="connectToPeer()">Chat</button>
        </div>
        <div class="modal-content">
            <div class="form-group">
                <div class="form-row">
                    <span class="form-label">To:</span>
                    <input type="text" class="form-input" id="inputPeerId" placeholder="Enter peer ID...">
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatHistory = document.getElementById('chatHistory');
        const messageInput = document.getElementById('messageInput');
        const btnInputRight = document.getElementById('btnInputRight');
        const chatBlocker = document.getElementById('chatBlocker');
        const activeName = document.getElementById('activeName');
        const activeAvatar = document.getElementById('activeAvatar');
       
        let peer = null;
        let activeConnection = null;
        let myId = null;

        // Audio Recording variables
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let audioStream = null;

        // Initialize PeerJS
        peer = new Peer();
        peer.on('open', id => {
            myId = id;
            document.getElementById('myPeerIdDisplay').innerText = id;
        });

        peer.on('connection', conn => {
            conn.on('open', () => {
                setActiveConnection(conn);
            });
            setupConnectionListeners(conn);
        });

        function setActiveConnection(conn) {
            activeConnection = conn;
            chatBlocker.style.display = 'none';
            activeName.innerText = conn.peer;
            activeAvatar.innerText = conn.peer.substring(0, 1).toUpperCase();
            chatHistory.innerHTML = '<div class="timestamp">Today 9:41 AM</div>';
            document.getElementById('modalNewChat').classList.remove('active');
        }

        function setupConnectionListeners(conn) {
            conn.on('data', data => {
                if (data.type === 'text') {
                    appendMessage(data.content, false);
                } else if (data.type === 'audio') {
                    const blob = new Blob([data.content], { type: 'audio/webm' });
                    appendAudioMessage(blob, false);
                }
            });
        }

        function connectToPeer() {
            const peerId = document.getElementById('inputPeerId').value.trim();
            if(!peerId) return;
            const conn = peer.connect(peerId);
            conn.on('open', () => {
                setActiveConnection(conn);
                setupConnectionListeners(conn);
            });
        }

        document.getElementById('btnMyProfile').addEventListener('click', () => {
            document.getElementById('modalProfile').classList.add('active');
        });

        document.getElementById('btnNewMessage').addEventListener('click', () => {
            document.getElementById('modalNewChat').classList.add('active');
        });

        // Toggle Mic/Send button state
        messageInput.addEventListener('input', () => {
            if(messageInput.value.trim() !== '') {
                btnInputRight.className = 'btn-action-right state-send';
                btnInputRight.innerHTML = '<svg class="icon-send" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>';
            } else {
                btnInputRight.className = 'btn-action-right state-mic';
                btnInputRight.innerHTML = '<svg class="icon-mic" viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>';
            }
        });

        // Send or Record Action
        btnInputRight.addEventListener('click', async () => {
            if (btnInputRight.classList.contains('state-send')) {
                // Send Text
                const text = messageInput.value.trim();
                if (text && activeConnection) {
                    activeConnection.send({ type: 'text', content: text });
                    appendMessage(text, true);
                    messageInput.value = '';
                    messageInput.dispatchEvent(new Event('input'));
                }
            } else {
                // Audio Recording Toggle
                if (!isRecording) {
                    try {
                        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        mediaRecorder = new MediaRecorder(audioStream);
                        audioChunks = [];
                       
                        mediaRecorder.addEventListener("dataavailable", event => {
                            audioChunks.push(event.data);
                        });

                        mediaRecorder.addEventListener("stop", () => {
                            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                            if(activeConnection) {
                                activeConnection.send({ type: 'audio', content: audioBlob });
                                appendAudioMessage(audioBlob, true);
                            }
                            audioStream.getTracks().forEach(track => track.stop());
                        });

                        mediaRecorder.start();
                        isRecording = true;
                       
                        // Change UI to recording state
                        btnInputRight.className = 'btn-action-right state-recording';
                        btnInputRight.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>'; // Stop icon
                        messageInput.placeholder = "Recording audio...";
                        messageInput.disabled = true;

                    } catch (err) {
                        console.error("Microphone access denied", err);
                        alert("Microphone access is required to send audio messages.");
                    }
                } else {
                    // Stop Recording
                    mediaRecorder.stop();
                    isRecording = false;
                   
                    // Reset UI
                    btnInputRight.className = 'btn-action-right state-mic';
                    btnInputRight.innerHTML = '<svg class="icon-mic" viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>';
                    messageInput.placeholder = "JMessage";
                    messageInput.disabled = false;
                }
            }
        });

        function appendMessage(text, isMe) {
            const group = document.createElement('div');
            group.className = 'msg-group spacer';
           
            const wrapper = document.createElement('div');
            wrapper.className = `bubble-wrapper ${isMe ? 'me' : 'them'}`;
           
            const bubble = document.createElement('div');
            bubble.className = 'bubble single';
            bubble.innerText = text;
           
            wrapper.appendChild(bubble);
            group.appendChild(wrapper);
            chatHistory.appendChild(group);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function appendAudioMessage(blob, isMe) {
            const url = URL.createObjectURL(blob);
            const group = document.createElement('div');
            group.className = 'msg-group spacer';
           
            const wrapper = document.createElement('div');
            wrapper.className = `bubble-wrapper ${isMe ? 'me' : 'them'}`;
           
            const bubble = document.createElement('div');
            bubble.className = 'bubble single audio-bubble';
           
            const audioEl = document.createElement('audio');
            audioEl.controls = true;
            audioEl.src = url;
           
            bubble.appendChild(audioEl);
            wrapper.appendChild(bubble);
            group.appendChild(wrapper);
            chatHistory.appendChild(group);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>
</html>
